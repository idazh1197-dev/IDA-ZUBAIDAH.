<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Portofolio Galeri</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            margin:0;
        }

        h1{
            text-align:center;
            background:#2196F3;
            color:white;
            padding:20px;
            margin:0;
        }

        .gallery{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            margin:20px;
            gap:20px;
        }

        .card{
            width:220px;
            background:white;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.2);
            text-align:center;
            overflow:hidden;
        }

        .card img{
            width:100%;
            height:180px;
            object-fit:cover;
        }

        .card h3{
            margin:10px 0;
        }

        .card p{
            padding:0 10px 15px;
        }
    </style>
</head>
