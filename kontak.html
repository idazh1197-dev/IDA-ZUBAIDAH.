<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<title>Kontak Saya</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#2193b0,#6dd5ed);
}

.kotak{
    width:400px;
    background:#fff;
    margin:40px auto;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

img{
    width:130px;
    height:130px;
    border-radius:50%;
    border:5px solid #2193b0;
}

h1{
    color:#2193b0;
    margin-top:15px;
}

p{
    margin:8px;
    color:#444;
}

input,textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#2193b0;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#176d8a;
}
</style>

</head>
<body>

<div class="kotak">

    <img src="ida.jpeg" alt="ida.jpeg" width="150" height="150"> 

    <h1>Ida Zubaidah</h1>

    <p>📍 Barabai, Kalimantan Selatan</p>

</div>
